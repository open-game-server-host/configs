name: publish

on:
  push:
    branches:
    - 'main' # TODO support tagging configs with the branch

jobs:
  publish:
    runs-on: ubuntu-slim
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Sync configs # AWS CLI is already installed
      env:
        BUCKET: ${{ secrets.OGSH_CONFIG_S3_BUCKET }}
        ENDPOINT: ${{ secrets.OGSH_CONFIG_S3_ENDPOINT }}
        AWS_DEFAULT_REGION: ${{ secrets.OGSH_CONFIG_S3_REGION }}
        AWS_ACCESS_KEY_ID: ${{ secrets.OGSH_CONFIG_S3_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.OGSH_CONFIG_S3_SECRET_ACCESS_KEY }}
      run: |
        aws s3 sync ./configs s3://$BUCKET --delete --endpoint-url $ENDPOINT