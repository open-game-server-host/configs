name: publish

on:
  push:
    branches:
    - 'main' # TODO support tagging configs with the branch

jobs:
  publish:
    runs-on: ubuntu-slim
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Sync configs # AWS CLI is already installed
      env:
        BUCKET: ${{ secrets.OGSH_CONFIG_S3_BUCKET }}
        ENDPOINT: ${{ secrets.OGSH_CONFIG_S3_ENDPOINT }}
        REGION: ${{ secrets.OGSH_CONFIG_S3_REGION }}
        ACCESS_KEY_ID: ${{ secrets.OGSH_CONFIG_S3_ACCESS_KEY_ID }}
        SECRET_ACCESS_KEY: ${{ secrets.OGSH_CONFIG_S3_SECRET_ACCESS_KEY }}
      run: |
        echo "[profile configs]" >> ~/.aws/config
        echo "endpoint_url = $ENDPOINT" >> ~/.aws/config
        echo "[configs]" >> ~/.aws/credentials
        echo "aws_access_key_id = $ACCESS_KEY_ID"
        echo "aws_secret_access_key = $SECRET_ACCESS_KEY"
        aws s3 sync ./configs s3://$BUCKET --delete --region $REGION