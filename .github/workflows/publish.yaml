name: publish

on:
  push:
    branches:
    - '*'

jobs:
  publish:
    runs-on: ubuntu-slim
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Configure AWS command line
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-region: ${{ secrets.OGSH_CONFIG_S3_REGION }}
        aws-access-key-id: ${{ secrets.OGSH_CONFIG_S3_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.OGSH_CONFIG_S3_SECRET_ACCESS_KEY }}
        sts-endpoint: ${{ secrets.OGSH_CONFIG_S3_ENDPOINT }}
    - name: Publish configs
      run: aws s3 sync ./configs s3://ogsh-configs --delete